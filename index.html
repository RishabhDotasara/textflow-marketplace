<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextFlow Marketplace</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body class="min-h-screen bg-[var(--bg)] text-[var(--text)] font-sans antialiased">
  
  <header class="border-b border-white/10 glass sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-lg hover:opacity-80 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m8 17 4 4 4-4"></path></svg>
        TextFlow Marketplace
      </a>
      <nav class="flex gap-6 text-sm font-medium text-white/70">
        <a href="/" class="text-white">All Actions</a>
        <a href="https://github.com/sinosuke/textflow-marketplace" target="_blank" class="hover:text-white transition-colors">Submit Action</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-16">
    <div class="text-center mb-16 space-y-4">
      <h1 class="text-4xl md:text-6xl font-bold tracking-tight">Supercharge your workflow</h1>
      <p class="text-xl text-white/60 max-w-2xl mx-auto">Discover community-built actions to automate your browser, manipulate web pages, and integrate AI seamlessly.</p>
    </div>

    <div id="actions-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Actions will be injected here via JS -->
    </div>
  </main>

  <script>
    fetch('actions-index.json')
      .then(res => res.json())
      .then(actions => {
        const grid = document.getElementById('actions-grid');
        grid.innerHTML = actions.map(action => `
          <a href="actions/${action.id}/" class="group block glass rounded-2xl p-6 hover:border-primary/50 transition-all hover:shadow-xl hover:shadow-primary/5">
            <div class="flex items-start justify-between mb-4">
              <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-white/5 border border-white/10 group-hover:bg-primary/20 group-hover:text-primary group-hover:border-primary/30 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
              </div>
              <span class="text-xs font-medium text-white/50">${action.author}</span>
            </div>
            <h3 class="text-lg font-bold mb-2 group-hover:text-primary transition-colors">${action.name}</h3>
            <p class="text-sm text-white/60 line-clamp-2">${action.description}</p>
            <div class="mt-6 flex flex-wrap gap-2">
              ${action.capabilities.map(cap => `
                <span class="px-2.5 py-0.5 rounded-full text-[10px] font-medium uppercase tracking-wider bg-white/5 border border-white/10 text-white/60">
                  ${cap}
                </span>
              `).join('')}
            </div>
          </a>
        `).join('');
      })
      .catch(err => {
        console.error("Failed to load actions", err);
      });
  </script>
</body>
</html>
